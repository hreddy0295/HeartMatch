<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HeartMatch - Settings</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:20px;
}

.container{
    max-width:600px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    color:#e91e63;
}

.setting{
    margin:15px 0;
    padding:12px;
    border:1px solid #ddd;
    border-radius:5px;
}

label{
    font-weight:bold;
}

select,input{
    width:100%;
    padding:10px;
    margin-top:8px;
    border:1px solid #ccc;
    border-radius:5px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    background:#e91e63;
    color:#fff;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#c2185b;
}
</style>

</head>
<body>

<div class="container">

<h2>Settings</h2>

<div class="setting">
<label>Language</label>
<select>
<option>English</option>
<option>Telugu</option>
<option>Hindi</option>
<option>Tamil</option>
</select>
</div>

<div class="setting">
<label>Notification</label>
<select>
<option>Enable</option>
<option>Disable</option>
</select>
</div>

<div class="setting">
<label>Change Mobile Number</label>
<input type="tel" placeholder="Enter New Mobile Number">
</div>
