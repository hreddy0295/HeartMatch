<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HeartMatch - Contact Us</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:20px;
}

.container{
    max-width:600px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    color:#e91e63;
}

input,textarea{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    background:#e91e63;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#c2185b;
}

.info{
    margin-top:20px;
    text-align:center;
    line-height:1.8;
}
</style>
</head>

<body>

<div class="container">

<h2>Contact Us</h2>

<form>

<input type="text" placeholder="Your Name" required>

<input type="email" placeholder="Your Email" required>

<input type="tel" placeholder="Mobile Number" required>

<textarea rows="5" placeholder="Write your message here..." required></textarea>

<button type="submit">Send Message</button>

</form>

<div class="info">
<h3>HeartMatch Support</h3>
<p>📞 Phone: +91 9876543210</p>
<p>📧 Email: support@heartmatch.com</p>
<p>📍 Address: Hyderabad, Telangana, India</p>
<p>🕒 Support Hours: Monday - Saturday, 9:00 AM - 6:00 PM</p>
</div>

</div>

</body>
</html>
