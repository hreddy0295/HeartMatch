<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HeartMatch - Sign Up</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#ffe6ea;
padding:20px;
}

.container{
max-width:420px;
margin:auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,.2);
}

h2{
text-align:center;
color:#e91e63;
margin-bottom:20px;
}

input,select{
width:100%;
padding:12px;
margin:8px 0;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

button{
width:100%;
padding:12px;
background:#e91e63;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#c2185b;
}

p{
text-align:center;
margin-top:15px;
}

a{
text-decoration:none;
color:#e91e63;
font-weight:bold;
}
</style>

</head>

<body>

<div class="container">

<h2>❤️ HeartMatch Registration</h2>

<form>

<input type="text" placeholder="Full Name" required>

<input type="tel" placeholder="Mobile Number" required>

<input type="email" placeholder="Email Address" required>

<input type="password" placeholder="Password" required>

<select required>
<option value="">Select Gender</option>
<option>Male</option>
<option>Female</option>
</select>

<input type="date" required>

<input type="text" placeholder="Religion">

<input type="text" placeholder="Caste">

<input type="text" placeholder="City">

<input type="text" placeholder="Education">

<input type="text" placeholder="Occupation">

<input type="file">

<button type="submit">Register</button>

<p>Already have an account?</p>

<p><a href="login.html">Login Here</a></p>

</form>

</div>

</body>
</html>
