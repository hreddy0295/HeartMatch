<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HeartMatch - Contact Us</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}

.container{
    max-width:600px;
    margin:30px auto;
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    color:#e91e63;
}

label{
    font-weight:bold;
}

input,textarea{
    width:100%;
    padding:10px;
    margin:8px 0 15px;
    border:1px solid #ccc;
    border-radius:5px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    background:#e91e63;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#c2185b;
}

.contact{
    margin-top:25px;
    border-top:1px solid #ddd;
    padding-top:15px;
    text-align:center;
}

.contact p{
    margin:8px 0;
}
</style>

</head>
<body>

<div class="container">

<h2>Contact Us</h2>

<form>

<label>Full Name</label>
<input type="text" placeholder="Enter your name" required>

<label>Email ID</label>
<input type="email" placeholder="Enter your email" required>

<label>Mobile Number</label>
