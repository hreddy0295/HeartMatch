<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HeartMatch - Admin Dashboard</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}

.header{
    background:#e91e63;
    color:white;
    text-align:center;
    padding:15px;
}

.container{
    width:90%;
    max-width:1000px;
    margin:20px auto;
}

.card{
    background:white;
    padding:15px;
    margin-bottom:20px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.2);
}

table{
    width:100%;
    border-collapse:collapse;
}

table,th,td{
    border:1px solid #ddd;
}

th{
    background:#e91e63;
    color:white;
    padding:10px;
}

td{
    padding:10px;
    text-align:center;
}

button{
    padding:8px 15px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.approve{
    background:green;
    color:white;
}

.reject{
    background:red;
    color:white;
}

.delete{
    background:#555;
    color:white;
}
